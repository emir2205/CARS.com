<h1>Авторизация</h1>
<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}
    {{ form.as_p  }}
    <p>CAPTCHA: сколько будет 3 + 4 ?</p>
    <p><input type="number" name="captcha_answer" required></p>

    <button type="submit">Авторизация</button>
    <button type="reset">Очистить</button>

</form>
